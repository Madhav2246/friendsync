<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — FriendSync</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0a0f;--surface:#111118;--border:#1e1e2e;--accent:#6c63ff;--accent2:#ff6b9d;--text:#e8e8f0;--muted:#5a5a7a;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    h1,h2{font-family:'Syne',sans-serif;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:44px 40px;width:100%;max-width:420px;}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block;margin-bottom:8px;}
    .icon-wrap{width:56px;height:56px;background:rgba(108,99,255,0.1);border:1px solid rgba(108,99,255,0.2);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;}
    h1{font-size:1.4rem;font-weight:700;margin-bottom:6px;}
    p{color:var(--muted);font-size:0.875rem;line-height:1.6;margin-bottom:28px;}
    label{display:block;font-size:0.8rem;font-weight:500;color:var(--muted);margin-bottom:6px;}
    .input-wrap{position:relative;margin-bottom:20px;}
    .input-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
    input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:11px 16px 11px 42px;border-radius:10px;font-size:0.875rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;}
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,0.12);}
    input::placeholder{color:var(--muted);}
    .btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;border:none;border-radius:10px;font-size:0.9rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
    .btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(108,99,255,0.4);}
    .flash{padding:10px 14px;border-radius:9px;font-size:0.83rem;margin-bottom:18px;}
    .flash.success{background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.25);color:#00e676;}
    .flash.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#ef4444;}
    .flash.info{background:rgba(108,99,255,0.1);border:1px solid rgba(108,99,255,0.25);color:var(--accent);}
    .back-link{display:block;text-align:center;margin-top:20px;color:var(--muted);font-size:0.875rem;text-decoration:none;}
    .back-link span{color:var(--accent);}
    .back-link:hover span{text-decoration:underline;}
  </style>
</head>
<body>
  <div class="card">
    <span class="logo">FriendSync</span>
    <div class="icon-wrap">
      <svg width="24" height="24" fill="none" stroke="var(--accent)" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
      </svg>
    </div>
    <h1>Reset your password</h1>
    <p>Enter your email address and we'll send you a link to reset your password.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for cat,msg in messages %}
        <div class="flash {{cat}}">{{msg}}</div>
      {% endfor %}{% endif %}
    {% endwith %}

    <form method="POST" action="/auth/forgot-password">
      <label>Email Address</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        </span>
        <input type="email" name="email" placeholder="your@email.com" required>
      </div>
      <button type="submit" class="btn">Send Reset Link →</button>
    </form>

    <a href="/auth/login" class="back-link">← Back to <span>Sign In</span></a>
  </div>
</body>
</html>
