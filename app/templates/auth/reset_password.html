<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — FriendSync</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0a0f;--surface:#111118;--border:#1e1e2e;--accent:#6c63ff;--accent2:#ff6b9d;--text:#e8e8f0;--muted:#5a5a7a;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    h1{font-family:'Syne',sans-serif;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:44px 40px;width:100%;max-width:420px;}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block;margin-bottom:8px;}
    .icon-wrap{width:56px;height:56px;background:rgba(108,99,255,0.1);border:1px solid rgba(108,99,255,0.2);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;}
    h1{font-size:1.4rem;font-weight:700;margin-bottom:6px;}
    p{color:var(--muted);font-size:0.875rem;margin-bottom:28px;}
    label{display:block;font-size:0.8rem;font-weight:500;color:var(--muted);margin-bottom:6px;}
    .input-wrap{position:relative;margin-bottom:20px;}
    .input-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
    input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:11px 16px 11px 42px;border-radius:10px;font-size:0.875rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;}
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,0.12);}
    input::placeholder{color:var(--muted);}
    .btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;border:none;border-radius:10px;font-size:0.9rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
    .btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(108,99,255,0.4);}
    .flash{padding:10px 14px;border-radius:9px;font-size:0.83rem;margin-bottom:18px;}
    .flash.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#ef4444;}
    .pw-toggle{position:absolute;right:13px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--muted);background:none;border:none;display:flex;align-items:center;}
    .strength{height:4px;border-radius:999px;background:var(--border);margin-top:8px;overflow:hidden;}
    .strength-fill{height:100%;border-radius:999px;transition:width 0.3s,background 0.3s;width:0%;}
    .back-link{display:block;text-align:center;margin-top:20px;color:var(--muted);font-size:0.875rem;text-decoration:none;}
    .back-link span{color:var(--accent);}
  </style>
</head>
<body>
  <div class="card">
    <span class="logo">FriendSync</span>
    <div class="icon-wrap">
      <svg width="24" height="24" fill="none" stroke="var(--accent)" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>
    </div>
    <h1>Create new password</h1>
    <p>Must be at least 8 characters.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for cat,msg in messages %}
        <div class="flash {{cat}}">{{msg}}</div>
      {% endfor %}{% endif %}
    {% endwith %}

    <form method="POST" action="/auth/reset-password/{{ token }}">
      <label>New Password</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        </span>
        <input type="password" id="password" name="password" placeholder="••••••••" required oninput="checkStrength(this.value)">
        <button type="button" class="pw-toggle" onclick="const i=document.getElementById('password');i.type=i.type==='password'?'text':'password';">
          <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
        </button>
        <div class="strength"><div class="strength-fill" id="sf"></div></div>
      </div>
      <button type="submit" class="btn">Update Password →</button>
    </form>

    <a href="/auth/login" class="back-link">← Back to <span>Sign In</span></a>
  </div>
<script>
function checkStrength(pw){
  const f=document.getElementById('sf');
  let s=0;
  if(pw.length>=8)s++;if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^a-zA-Z0-9]/.test(pw))s++;
  const c=['transparent','#ef4444','#f59e0b','#3b82f6','#00e676'];
  const w=['0%','25%','50%','75%','100%'];
  f.style.width=w[s];f.style.background=c[s];
}
</script>
</body>
</html>
